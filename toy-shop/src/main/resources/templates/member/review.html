<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>나의 상품후기</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">

    <style>
        body{
            margin:0;
            font-family:"Malgun Gothic",sans-serif;
            background:#fff;
            color:#333;
        }

        .mypage-wrap{
            width:1100px;
            margin:60px auto 100px;
            display:flex;
            gap:60px;
        }

        .side-menu{
            width:180px;
            flex-shrink:0;
        }

        .side-menu h2{
            font-size:22px;
            margin-bottom:35px;
        }

        .menu-section{
            border-bottom:1px solid #eee;
            margin-bottom:25px;
            padding-bottom:15px;
        }

        .menu-section h3{
            font-size:16px;
            margin-bottom:12px;
        }

        .menu-section a{
            display:block;
            text-decoration:none;
            color:#777;
            margin:8px 0;
            font-size:14px;
        }

        .menu-section a:hover,
        .active{
            color:#111 !important;
            font-weight:bold;
        }

        .content{
            flex:1;
            min-width:0;
        }

        .page-title{
            text-align:center;
            font-size:40px;
            font-weight:bold;
            margin-bottom:40px;
        }

        .empty-box{
            border:1px solid #e5e5e5;
            height:350px;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#999;
            font-size:15px;
        }

        .review-list{
            border-top:2px solid #333;
        }

        .review-item{
            display:flex;
            gap:20px;
            padding:22px 0;
            border-bottom:1px solid #eee;
        }

        .review-img{
            width:110px;
            height:110px;
            background:#f5f5f5;
            border:1px solid #eee;
            overflow:hidden;
            flex-shrink:0;
        }

        .review-img img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .review-info{
            flex:1;
            min-width:0;
        }

        .review-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:8px;
        }

        .item-name{
            font-size:16px;
            font-weight:bold;
            color:#222;
            word-break:break-all;
        }

        .created-at{
            font-size:13px;
            color:#999;
            white-space:nowrap;
        }

        .rating{
            color:#f5a623;
            font-size:15px;
            margin-bottom:8px;
        }

        .review-title{
            font-size:15px;
            font-weight:bold;
            margin-bottom:7px;
            word-break:break-all;
        }

        .review-content{
            font-size:14px;
            color:#666;
            line-height:1.6;
            word-break:break-all;
        }

        .write-btn{
            margin-top:15px;
            text-align:right;
        }

        .write-btn a{
            display:inline-block;
            background:#333;
            color:white;
            text-decoration:none;
            padding:10px 18px;
            font-size:14px;
        }

        /* =========================
           Responsive
        ========================== */

        @media (max-width:1200px){
            .mypage-wrap{
                width:94%;
                gap:35px;
            }
        }

        @media (max-width:1024px){
            .mypage-wrap{
                flex-direction:column;
                margin:45px auto 75px;
            }

            .side-menu{
                width:100%;
                display:grid;
                grid-template-columns:repeat(4, 1fr);
                gap:12px;
            }

            .side-menu h2{
                grid-column:1 / -1;
                margin-bottom:8px;
                text-align:center;
            }

            .menu-section{
                border:1px solid #eee;
                border-radius:8px;
                margin-bottom:0;
                padding:14px;
            }
        }

        @media (max-width:768px){
            .mypage-wrap{
                width:94%;
                margin:35px auto 60px;
            }

            .side-menu{
                grid-template-columns:repeat(2, 1fr);
                gap:10px;
            }

            .menu-section{
                padding:12px;
            }

            .menu-section h3{
                font-size:14px;
            }

            .menu-section a{
                font-size:13px;
            }

            .page-title{
                font-size:30px;
                margin-bottom:28px;
            }

            .review-item{
                gap:14px;
                padding:18px 0;
            }

            .review-img{
                width:92px;
                height:92px;
            }

            .review-top{
                flex-direction:column;
                align-items:flex-start;
                gap:4px;
            }

            .item-name{
                font-size:15px;
            }

            .created-at{
                font-size:12px;
            }

            .empty-box{
                height:260px;
                font-size:14px;
            }

            .write-btn a{
                width:100%;
                text-align:center;
                box-sizing:border-box;
            }
        }

        @media (max-width:480px){
            .mypage-wrap{
                width:100%;
                padding:0 14px;
                margin:30px auto 50px;
                box-sizing:border-box;
            }

            .side-menu{
                grid-template-columns:1fr;
            }

            .side-menu h2{
                font-size:19px;
            }

            .page-title{
                font-size:25px;
            }

            .review-item{
                flex-direction:column;
                gap:12px;
            }

            .review-img{
                width:100%;
                height:180px;
            }

            .review-img img{
                object-fit:contain;
                background:#fafafa;
            }

            .rating{
                font-size:14px;
            }

            .review-title{
                font-size:14px;
            }

            .review-content{
                font-size:13px;
            }

            .empty-box{
                height:210px;
                font-size:13px;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="mypage-wrap">

    <aside class="side-menu">

        <h2>MY SHOPPING</h2>

        <div class="menu-section">
            <h3>나의 쇼핑</h3>
            <a href="/order">주문/배송</a>
            <a href="/wishlist/list">위시리스트</a>
            <a href="/recent/list">최근 본 상품</a>
            <a href="/address/list">배송주소록</a>
        </div>

        <div class="menu-section">
            <h3>나의 혜택</h3>
            <a href="/member/mileage">마일리지</a>
        </div>

        <div class="menu-section">
            <h3>나의 활동</h3>
            <a href="/member/inquiry">나의 1:1문의</a>
            <a href="/member/product-qna">나의 상품문의</a>
            <a href="/member/review" class="active">나의 상품후기</a>
        </div>

        <div class="menu-section">
            <h3>나의 정보</h3>
            <a href="/member/edit">회원정보 수정</a>
            <a href="/member/change-password">비밀번호 변경</a>
            <a href="/member/dormant">휴면 전환</a>
        </div>

    </aside>

    <main class="content">

        <div class="page-title">
            나의 상품후기
        </div>

        <div class="empty-box"
             th:if="${reviewList == null or #lists.isEmpty(reviewList)}">
            등록된 상품후기가 없습니다.
        </div>

        <div class="review-list"
             th:if="${reviewList != null and !#lists.isEmpty(reviewList)}">

            <div class="review-item" th:each="review : ${reviewList}">

                <div class="review-img">
                    <img th:if="${review.itemImage != null}"
                         th:src="@{${review.itemImage}}"
                         alt="상품 이미지">

                    <img th:if="${review.itemImage == null}"
                         src="/images/no-image.png"
                         alt="상품 이미지 없음">
                </div>

                <div class="review-info">

                    <div class="review-top">
                        <div class="item-name" th:text="${review.itemName}">
                            상품명
                        </div>

                        <div class="created-at" th:text="${review.createdAt}">
                            2026-06-05
                        </div>
                    </div>

                    <div class="rating">
                        <span th:if="${review.rating == 5}">★★★★★</span>
                        <span th:if="${review.rating == 4}">★★★★☆</span>
                        <span th:if="${review.rating == 3}">★★★☆☆</span>
                        <span th:if="${review.rating == 2}">★★☆☆☆</span>
                        <span th:if="${review.rating == 1}">★☆☆☆☆</span>
                    </div>

                    <div class="review-title" th:text="${review.title}">
                        후기 제목
                    </div>

                    <div class="review-content" th:text="${review.content}">
                        후기 내용
                    </div>

                </div>

            </div>

        </div>

        <div class="write-btn">
            <a href="/member/review/write">
                상품후기 쓰기
            </a>
        </div>

    </main>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
