<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - TOY-SHOP</title>

    <link rel="stylesheet" href="/css/common.css">

    <style>
        body{
            background:#fff;
        }

        .login-wrap{
            width:420px;
            margin:90px auto 100px;
        }

        .login-title{
            text-align:center;
            font-size:32px;
            font-weight:bold;
            margin-bottom:35px;
        }

        .login-box{
            border-top:2px solid #333;
            padding-top:25px;
        }

        .login-input{
            width:100%;
            height:48px;
            border:1px solid #ddd;
            padding:0 15px;
            font-size:15px;
            margin-bottom:10px;
            outline:none;
            box-sizing:border-box;
        }

        .login-btn{
            width:100%;
            height:50px;
            border:none;
            background:#3f3f3f;
            color:white;
            font-size:17px;
            cursor:pointer;
            margin-top:10px;
        }

        .login-btn:hover{
            background:#222;
        }

        .login-links{
            margin-top:20px;
            text-align:center;
            font-size:14px;
            color:#777;
        }

        .login-links a{
            text-decoration:none;
            color:#555;
            margin:0 8px;
        }

        .error-msg{
            color:#ff4d00;
            font-size:14px;
            text-align:center;
            margin-bottom:15px;
        }

        .success-msg{
            color:#1976d2;
            font-size:14px;
            text-align:center;
            margin-bottom:15px;
        }

        /* =========================
           Responsive
        ========================== */

        @media (max-width:768px){
            .login-wrap{
                width:92%;
                margin:60px auto 75px;
            }

            .login-title{
                font-size:28px;
                margin-bottom:28px;
            }

            .login-input{
                height:46px;
                font-size:14px;
            }

            .login-btn{
                height:48px;
                font-size:16px;
            }
        }

        @media (max-width:480px){
            .login-wrap{
                width:100%;
                padding:0 14px;
                margin:40px auto 55px;
                box-sizing:border-box;
            }

            .login-title{
                font-size:24px;
            }

            .login-box{
                padding-top:20px;
            }

            .login-input{
                height:44px;
                font-size:13px;
                padding:0 12px;
            }

            .login-btn{
                height:46px;
                font-size:15px;
            }

            .login-links{
                display:flex;
                flex-wrap:wrap;
                justify-content:center;
                gap:8px 0;
                font-size:13px;
                line-height:1.8;
            }

            .login-links a{
                margin:0 6px;
            }

            .error-msg,
            .success-msg{
                font-size:13px;
                line-height:1.5;
            }
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="login-wrap">

    <div class="login-title">로그인</div>

    <div class="login-box">

        <div class="success-msg"
             th:if="${param.changed}">
            비밀번호가 변경되었습니다. 다시 로그인해주세요.
        </div>

        <div class="error-msg"
             th:if="${error}"
             th:text="${error}">
        </div>

        <form action="/member/login" method="post">

            <input type="text"
                   name="loginId"
                   class="login-input"
                   placeholder="아이디"
                   required>

            <input type="password"
                   name="password"
                   class="login-input"
                   placeholder="비밀번호"
                   required>

            <button type="submit" class="login-btn">로그인</button>

        </form>

        <div class="login-links">
            <a href="/member/join">회원가입</a>
            |
            <a href="/member/find-id">아이디 찾기</a>
            |
            <a href="/member/find-password">비밀번호 찾기</a>
        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
