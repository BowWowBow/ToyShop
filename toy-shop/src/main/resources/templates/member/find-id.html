<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>아이디 찾기</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">

    <style>
        body{
            margin:0;
            font-family:"Malgun Gothic",sans-serif;
            background:#fff;
        }

        .find-wrap{
            width:600px;
            margin:80px auto;
        }

        .title{
            text-align:center;
            font-size:42px;
            font-weight:300;
            margin-bottom:50px;
        }

        .tab-box{
            display:flex;
            margin-bottom:40px;
        }

        .tab{
            flex:1;
            height:60px;
            line-height:60px;
            text-align:center;
            border:1px solid #ddd;
            text-decoration:none;
            color:#777;
            background:#f5f5f5;
        }

        .tab.active{
            background:#fff;
            color:#111;
            font-weight:bold;
            border-bottom:none;
        }

        .sub-title{
            text-align:center;
            font-size:30px;
            margin-bottom:15px;
        }

        .sub-desc{
            text-align:center;
            color:#888;
            margin-bottom:40px;
            line-height:1.6;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            width:120px;
            background:#fafafa;
            border:1px solid #eee;
            padding:18px;
            text-align:left;
        }

        td{
            border:1px solid #eee;
            padding:10px;
        }

        input{
            width:100%;
            height:45px;
            border:1px solid #ddd;
            padding:0 10px;
            box-sizing:border-box;
        }

        .btn{
            width:100%;
            height:60px;
            border:none;
            background:#444;
            color:#fff;
            font-size:20px;
            margin-top:20px;
            cursor:pointer;
        }

        .result-box{
            margin-top:30px;
            padding:25px;
            background:#f8f8f8;
            border:1px solid #ddd;
            text-align:center;
        }

        .error{
            color:red;
            margin-top:20px;
            text-align:center;
        }

        /* =========================
           Responsive
        ========================== */

        @media (max-width:768px){
            .find-wrap{
                width:92%;
                margin:50px auto 70px;
            }

            .title{
                font-size:32px;
                margin-bottom:35px;
            }

            .tab-box{
                margin-bottom:32px;
            }

            .tab{
                height:52px;
                line-height:52px;
                font-size:14px;
            }

            .sub-title{
                font-size:24px;
            }

            .sub-desc{
                font-size:14px;
                margin-bottom:30px;
            }

            table,
            tbody,
            tr,
            th,
            td{
                display:block;
                width:100%;
            }

            tr{
                border-bottom:1px solid #eee;
                padding:10px 0;
            }

            th{
                border:none;
                background:#fff;
                padding:8px 4px;
                font-size:14px;
            }

            td{
                border:none;
                padding:4px 0 10px;
            }

            input{
                height:44px;
                font-size:14px;
            }

            .btn{
                height:52px;
                font-size:17px;
            }
        }

        @media (max-width:480px){
            .find-wrap{
                width:100%;
                padding:0 14px;
                margin:35px auto 55px;
                box-sizing:border-box;
            }

            .title{
                font-size:26px;
                margin-bottom:28px;
            }

            .tab-box{
                flex-direction:column;
                margin-bottom:26px;
            }

            .tab{
                height:48px;
                line-height:48px;
                font-size:13px;
            }

            .tab.active{
                border-bottom:1px solid #ddd;
            }

            .sub-title{
                font-size:20px;
            }

            .sub-desc{
                font-size:13px;
                margin-bottom:24px;
            }

            th{
                font-size:13px;
            }

            input{
                height:42px;
                font-size:13px;
            }

            .btn{
                height:48px;
                font-size:15px;
            }

            .result-box{
                padding:18px;
                font-size:13px;
            }

            .error{
                font-size:13px;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="find-wrap">

    <div class="title">아이디/비밀번호 찾기</div>

    <div class="tab-box">
        <a href="/member/find-id" class="tab active">아이디 찾기</a>
        <a href="/member/find-password" class="tab">비밀번호 찾기</a>
    </div>

    <div class="sub-title">등록 정보로 아이디 찾기</div>

    <div class="sub-desc">
        회원가입 시 등록한 정보가 일치하면 아이디를 이메일로 발송합니다.
    </div>

    <form method="post" action="/member/find-id">

        <table>
            <tr>
                <th>이름</th>
                <td>
                    <input type="text" name="name" required>
                </td>
            </tr>

            <tr>
                <th>이메일</th>
                <td>
                    <input type="email" name="email" required>
                </td>
            </tr>
        </table>

        <button type="submit" class="btn">
            아이디 이메일 발송
        </button>

    </form>

    <div class="result-box"
         th:if="${msg != null}"
         th:text="${msg}">
    </div>

    <div class="error"
         th:if="${error != null}"
         th:text="${error}">
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
