<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 완료 - TOY-SHOP</title>

    <link rel="stylesheet" href="/css/common.css">

    <style>
        body{
            background:#fff;
        }

        .complete-wrap{
            width:620px;
            margin:90px auto 100px;
            text-align:center;
        }

        .complete-box{
            border:1px solid #eee;
            background:white;
            padding:60px 40px;
            box-shadow:0 5px 20px rgba(0,0,0,.05);
        }

        .complete-icon{
            width:80px;
            height:80px;
            margin:0 auto 25px;
            border-radius:50%;
            background:#ffc107;
            color:white;
            font-size:46px;
            line-height:80px;
            font-weight:bold;
        }

        .complete-title{
            font-size:30px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .complete-text{
            font-size:16px;
            color:#666;
            line-height:1.8;
            margin-bottom:35px;
        }

        .btn-box{
            display:flex;
            justify-content:center;
            gap:10px;
        }

        .btn{
            width:160px;
            height:46px;
            line-height:46px;
            text-decoration:none;
            font-size:15px;
            display:inline-block;
            box-sizing:border-box;
        }

        .login-btn{
            background:#3f3f3f;
            color:white;
        }

        .home-btn{
            background:white;
            color:#333;
            border:1px solid #aaa;
        }

        /* =========================
           Responsive
        ========================== */

        @media (max-width:768px){
            .complete-wrap{
                width:92%;
                margin:60px auto 75px;
            }

            .complete-box{
                padding:45px 28px;
            }

            .complete-icon{
                width:70px;
                height:70px;
                line-height:70px;
                font-size:40px;
            }

            .complete-title{
                font-size:25px;
            }

            .complete-text{
                font-size:14px;
                margin-bottom:28px;
            }

            .btn{
                height:44px;
                line-height:44px;
                font-size:14px;
            }
        }

        @media (max-width:480px){
            .complete-wrap{
                width:100%;
                padding:0 14px;
                margin:40px auto 55px;
                box-sizing:border-box;
            }

            .complete-box{
                padding:36px 18px;
            }

            .complete-icon{
                width:62px;
                height:62px;
                line-height:62px;
                font-size:34px;
                margin-bottom:20px;
            }

            .complete-title{
                font-size:21px;
                line-height:1.4;
            }

            .complete-text{
                font-size:13px;
                line-height:1.7;
            }

            .btn-box{
                flex-direction:column;
                gap:8px;
            }

            .btn{
                width:100%;
                height:42px;
                line-height:42px;
                font-size:13px;
            }
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="complete-wrap">

    <div class="complete-box">
        <div class="complete-icon">✓</div>

        <div class="complete-title">회원가입이 완료되었습니다.</div>

        <div class="complete-text">
            TOY-SHOP의 회원이 되신 것을 환영합니다.<br>
            로그인 후 다양한 장난감 상품을 만나보세요.
        </div>

        <div class="btn-box">
            <a href="/member/login" class="btn login-btn">로그인하기</a>
            <a href="/" class="btn home-btn">메인으로</a>
        </div>
    </div>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
