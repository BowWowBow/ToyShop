<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>

    <link rel="stylesheet" href="/css/common.css">

    <style>

        .change-wrap{
            width:500px;
            margin:80px auto;
        }

        .title{
            font-size:32px;
            text-align:center;
            margin-bottom:40px;
        }

        .input-box{
            width:100%;
            height:50px;
            border:1px solid #ddd;
            padding:0 15px;
            margin-bottom:15px;
            box-sizing:border-box;
        }

        .btn{
            width:100%;
            height:55px;
            border:none;
            background:#333;
            color:#fff;
            font-size:18px;
            cursor:pointer;
        }

        .msg{
            color:blue;
            text-align:center;
            margin-bottom:15px;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:15px;
        }

        /* =========================
           Responsive
        ========================== */

        @media (max-width:768px){
            .change-wrap{
                width:92%;
                margin:55px auto 70px;
            }

            .title{
                font-size:27px;
                margin-bottom:30px;
            }

            .input-box{
                height:48px;
                font-size:14px;
            }

            .btn{
                height:52px;
                font-size:16px;
            }
        }

        @media (max-width:480px){
            .change-wrap{
                width:100%;
                padding:0 16px;
                margin:40px auto 55px;
                box-sizing:border-box;
            }

            .title{
                font-size:23px;
                margin-bottom:24px;
            }

            .input-box{
                height:45px;
                padding:0 12px;
                font-size:13px;
                margin-bottom:12px;
            }

            .btn{
                height:48px;
                font-size:15px;
            }

            .msg,
            .error{
                font-size:13px;
            }
        }

    </style>

</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="change-wrap">


    <div class="title">비밀번호 변경</div>

    <div class="msg"
         th:if="${msg}"
         th:text="${msg}">
    </div>

    <div class="error"
         th:if="${error}"
         th:text="${error}">
    </div>

    <form action="/member/change-password"
          method="post">

        <input type="password"
               name="currentPassword"
               class="input-box"
               placeholder="현재 비밀번호"
               required>

        <input type="password"
               name="newPassword"
               class="input-box"
               placeholder="새 비밀번호"
               required>

        <input type="password"
               name="confirmPassword"
               class="input-box"
               placeholder="새 비밀번호 확인"
               required>

        <button type="submit"
                class="btn">
            비밀번호 변경
        </button>

    </form>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
