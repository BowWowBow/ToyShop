<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TOY-SHOP</title>

    <link rel="stylesheet" href="/css/common.css">

    <style>
        .slider{
            width:1500px;
            height:440px;
            margin:10px auto 40px;
            position:relative;
            overflow:hidden;
            border-radius:8px;
            background:#eee;
        }

        .slide-track{
            width:300%;
            height:100%;
            display:flex;
            animation:slide 12s infinite;
        }

        .slide{
            width:33.3333%;
            height:100%;
            position:relative;
            overflow:hidden;
            background:#eee;
        }

        .slide-bg{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
            object-fit:cover;
            filter:blur(18px);
            transform:scale(1.15);
            opacity:.65;
        }

        .slide-main{
            position:absolute;
            left:50%;
            top:50%;
            width:100%;
            height:100%;
            object-fit:contain;
            transform:translate(-50%, -50%);
            z-index:2;
        }

        .slide::after{
            content:"";
            position:absolute;
            inset:0;
            background:rgba(255,255,255,.08);
            z-index:1;
        }

        @keyframes slide{
            0%{transform:translateX(0)}
            28%{transform:translateX(0)}
            33%{transform:translateX(-33.3333%)}
            61%{transform:translateX(-33.3333%)}
            66%{transform:translateX(-66.6666%)}
            94%{transform:translateX(-66.6666%)}
            100%{transform:translateX(0)}
        }

        .dots{
            position:absolute;
            bottom:18px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            gap:8px;
            z-index:10;
        }

        .dots span{
            width:28px;
            height:8px;
            background:white;
            border-radius:10px;
            opacity:.9;
        }

        .section{
            width:1500px;
            margin:50px auto 80px;
        }

        .section-title{
            text-align:center;
            font-size:32px;
            margin-bottom:30px;
        }

        .product-grid{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:25px;
        }

        .product{
            display:block;
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
            text-decoration:none;
            color:#222;
            transition:.2s;
        }

        .product:hover{
            transform:translateY(-4px);
            box-shadow:0 8px 22px rgba(0,0,0,.14);
        }

        .product-image{
            width:100%;
            height:220px;
            background:#eee;
            border-radius:10px;
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .product-image img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .product-name{
            margin-top:15px;
            font-size:18px;
            font-weight:bold;
            min-height:45px;
        }

        .product-category{
            margin-top:8px;
            font-size:13px;
            color:#888;
        }

        .product-price{
            margin-top:10px;
            color:#ff5722;
            font-size:22px;
            font-weight:bold;
        }

        .empty-product{
            grid-column:1 / -1;
            height:180px;
            border:1px solid #ddd;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#777;
            background:white;
        }


        /* ===== Responsive ===== */
        @media (max-width:1540px){
            .slider,.section{width:94%;}
        }
        @media (max-width:1024px){
            .slider{height:340px;}
            .product-grid{grid-template-columns:repeat(3,1fr);}
            .section-title{font-size:28px;}
        }
        @media (max-width:768px){
            .slider{height:250px;margin:10px auto 30px;}
            .section{margin:35px auto 50px;}
            .section-title{font-size:24px;margin-bottom:20px;}
            .product-grid{grid-template-columns:repeat(2,1fr);gap:16px;}
            .product{padding:14px;}
            .product-image{height:180px;}
            .product-name{font-size:16px;min-height:auto;}
            .product-price{font-size:18px;}
        }
        @media (max-width:480px){
            .slider{height:180px;border-radius:0;}
            .dots span{width:18px;height:6px;}
            .section{width:100%;padding:0 14px;box-sizing:border-box;}
            .section-title{font-size:22px;}
            .product-grid{grid-template-columns:1fr;gap:14px;}
            .product-image{height:220px;}
            .product-name{font-size:15px;}
            .product-price{font-size:17px;}
            .empty-product{height:140px;font-size:13px;}
        }

    </style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="slider">
    <div class="slide-track">

        <div class="slide">
            <img class="slide-bg" src="/images/banner1.png" alt="">
            <img class="slide-main" src="/images/banner1.png" alt="배너1">
        </div>

        <div class="slide">
            <img class="slide-bg" src="/images/banner2.png" alt="">
            <img class="slide-main" src="/images/banner2.png" alt="배너2">
        </div>

        <div class="slide">
            <img class="slide-bg" src="/images/banner3.png" alt="">
            <img class="slide-main" src="/images/banner3.png" alt="배너3">
        </div>

    </div>

    <div class="dots">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<div class="section">
    <h2 class="section-title">신상품</h2>
    <div class="product-grid">
        <div class="empty-product" th:if="${#lists.isEmpty(newList)}">
            등록된 상품이 없습니다.
        </div>

        <a class="product"
           th:each="product : ${newList}"
           th:href="@{/product/detail/{id}(id=${product.id})}">
            <div class="product-image">
                <img th:src="@{${product.imageUrl}}" alt="상품이미지">
            </div>
            <div class="product-category" th:text="${product.category}"></div>
            <div class="product-name" th:text="${product.productName}"></div>
            <div class="product-price"
                 th:text="${#numbers.formatInteger(product.price, 3, 'COMMA') + '원'}"></div>
        </a>
    </div>
</div>
