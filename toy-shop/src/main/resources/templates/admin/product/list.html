<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품관리 - TOY-SHOP</title>

    <link rel="stylesheet" href="/css/common.css">

    <style>
        body{
            background:#fff;
        }

        .admin-wrap{
            width:100%;
            max-width:1200px;
            margin:70px auto 100px;
            padding:0 20px;
        }

        .admin-title{
            font-size:32px;
            font-weight:bold;
            text-align:center;
            margin-bottom:25px;
        }

        .admin-menu{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-bottom:35px;
            flex-wrap:wrap;
        }

        .admin-menu a{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-height:42px;
            padding:0 24px;
            border:1px solid #ccc;
            text-decoration:none;
            color:#333;
            font-size:14px;
            background:white;
        }

        .admin-menu a.active{
            background:#333;
            color:white;
            border-color:#333;
        }

        .admin-top{
            display:flex;
            justify-content:space-between;
            align-items:flex-end;
            gap:15px;
            margin-bottom:15px;
        }

        .date-form{
            display:flex;
            gap:6px;
            align-items:center;
            flex-wrap:wrap;
        }

        .date-form input{
            height:38px;
            border:1px solid #ccc;
            padding:0 10px;
            font-size:14px;
        }

        .date-form button,
        .date-form a{
            height:38px;
            line-height:38px;
            padding:0 15px;
            border:none;
            background:#333;
            color:white;
            text-decoration:none;
            font-size:13px;
            cursor:pointer;
            white-space:nowrap;
        }

        .date-form a{
            background:#777;
        }

        .date-wave{
            color:#777;
            font-size:14px;
        }

        .right-box{
            display:flex;
            align-items:center;
            gap:15px;
            flex-wrap:wrap;
            justify-content:flex-end;
        }

        .top-info{
            color:#777;
            font-size:14px;
            white-space:nowrap;
        }

        .new-btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-height:42px;
            padding:0 22px;
            background:#333;
            color:white;
            text-decoration:none;
            font-size:14px;
            white-space:nowrap;
        }

        .table-wrap{
            width:100%;
            overflow-x:auto;
            border-top:2px solid #333;
        }

        table{
            width:100%;
            min-width:900px;
            border-collapse:collapse;
        }

        th{
            background:#f7f7f7;
            padding:14px 10px;
            border-bottom:1px solid #ddd;
            font-size:14px;
            white-space:nowrap;
        }

        th a{
            color:#222;
            text-decoration:none;
            font-weight:bold;
        }

        th a:hover{
            text-decoration:underline;
        }

        .sort-mark{
            color:#ff7a00;
            font-size:12px;
            margin-left:3px;
        }

        td{
            padding:14px 10px;
            border-bottom:1px solid #eee;
            text-align:center;
            font-size:14px;
            white-space:nowrap;
        }

        .product-img{
            width:70px;
            height:70px;
            object-fit:cover;
            border:1px solid #ddd;
            border-radius:8px;
        }

        .text-left{
            text-align:left;
            white-space:normal;
            min-width:220px;
        }

        .product-link{
            color:#222;
            text-decoration:none;
            font-weight:bold;
            line-height:1.4;
        }

        .product-link:hover{
            text-decoration:underline;
        }

        .stock-low{
            color:#ff4d00;
            font-weight:bold;
        }

        .empty{
            padding:60px 0;
            text-align:center;
            color:#777;
        }

        @media (max-width:1199px){
            .admin-wrap{
                margin:50px auto 80px;
            }

            .admin-top{
                align-items:flex-start;
                flex-direction:column;
            }

            .right-box{
                width:100%;
                justify-content:space-between;
            }
        }

        @media (max-width:767px){
            .admin-wrap{
                margin:35px auto 60px;
                padding:0 14px;
            }

            .admin-title{
                font-size:26px;
                margin-bottom:20px;
            }

            .admin-menu{
                display:grid;
                grid-template-columns:repeat(2, 1fr);
                gap:8px;
                margin-bottom:25px;
            }

            .admin-menu a{
                width:100%;
                padding:0 8px;
                font-size:13px;
            }

            .date-form{
                width:100%;
                display:grid;
                grid-template-columns:1fr 20px 1fr;
                gap:8px;
            }

            .date-form input{
                width:100%;
                font-size:13px;
            }

            .date-wave{
                text-align:center;
                line-height:38px;
            }

            .date-form button,
            .date-form a{
                grid-column:auto;
                text-align:center;
            }

            .date-form button{
                grid-column:1 / 3;
            }

            .date-form a{
                grid-column:3 / 4;
            }

            .right-box{
                gap:10px;
            }

            .top-info{
                width:100%;
                font-size:13px;
            }

            .new-btn{
                width:100%;
            }

            .table-wrap{
                border:1px solid #eee;
                border-top:2px solid #333;
                border-radius:8px;
            }

            table{
                min-width:820px;
            }

            th,
            td{
                padding:11px 8px;
                font-size:13px;
            }

            .product-img{
                width:58px;
                height:58px;
            }
        }

        @media (max-width:480px){
            .admin-wrap{
                width:100%;
                padding:0 12px;
                margin:30px auto 50px;
            }

            .admin-title{
                font-size:22px;
            }

            .admin-menu{
                grid-template-columns:1fr;
            }

            .admin-menu a{
                min-height:40px;
                font-size:13px;
            }

            .date-form{
                grid-template-columns:1fr;
            }

            .date-wave{
                display:none;
            }

            .date-form button,
            .date-form a{
                grid-column:auto;
                width:100%;
            }

            .right-box{
                flex-direction:column;
                align-items:stretch;
            }

            .top-info{
                text-align:left;
            }

            .new-btn{
                min-height:40px;
                font-size:13px;
            }

            table{
                min-width:760px;
            }

            th,
            td{
                padding:9px 7px;
                font-size:12px;
            }

            .product-img{
                width:52px;
                height:52px;
            }

            .text-left{
                min-width:190px;
            }

            .empty{
                padding:45px 0;
                font-size:13px;
            }
        }

    </style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="admin-wrap">

    <div class="admin-title">관리자 페이지</div>

    <div class="admin-menu">
        <a href="/admin/product/list" class="active">상품관리</a>
        <a href="/admin/product/edit-search">상품수정</a>
        <a href="/admin/order/list">주문관리</a>
        <a href="/admin/board/inquiry">게시글관리</a>
        <a href="/admin/member/list">회원관리</a>
    </div>

    <div class="admin-top">
        <form class="date-form" action="/admin/product/list" method="get">
            <input type="date" name="startDate" th:value="${startDate}">
            <span class="date-wave">~</span>
            <input type="date" name="endDate" th:value="${endDate}">

            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="dir" th:value="${dir}">

            <button type="submit">기간조회</button>
            <a href="/admin/product/list">전체</a>
        </form>

        <div class="right-box">
            <div class="top-info">
                전체 상품 <strong th:text="${productCount}">0</strong>개
            </div>

            <a href="/admin/product/new" class="new-btn">상품등록</a>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>
                    <a th:href="@{/admin/product/list(startDate=${startDate}, endDate=${endDate}, sort='id', dir=${sort == 'id' ? nextDir : 'asc'})}">
                        번호
                        <span class="sort-mark" th:if="${sort == 'id'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>

                <th>이미지</th>

                <th>
                    <a th:href="@{/admin/product/list(startDate=${startDate}, endDate=${endDate}, sort='productName', dir=${sort == 'productName' ? nextDir : 'asc'})}">
                        상품명
                        <span class="sort-mark" th:if="${sort == 'productName'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>

                <th>
                    <a th:href="@{/admin/product/list(startDate=${startDate}, endDate=${endDate}, sort='category', dir=${sort == 'category' ? nextDir : 'asc'})}">
                        카테고리
                        <span class="sort-mark" th:if="${sort == 'category'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>

                <th>
                    <a th:href="@{/admin/product/list(startDate=${startDate}, endDate=${endDate}, sort='price', dir=${sort == 'price' ? nextDir : 'asc'})}">
                        가격
                        <span class="sort-mark" th:if="${sort == 'price'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>

                <th>
                    <a th:href="@{/admin/product/list(startDate=${startDate}, endDate=${endDate}, sort='stockQty', dir=${sort == 'stockQty' ? nextDir : 'asc'})}">
                        재고
                        <span class="sort-mark" th:if="${sort == 'stockQty'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>

                <th>
                    <a th:href="@{/admin/product/list(startDate=${startDate}, endDate=${endDate}, sort='createdAt', dir=${sort == 'createdAt' ? nextDir : 'asc'})}">
                        등록일
                        <span class="sort-mark" th:if="${sort == 'createdAt'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </a>
                </th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(productList)}">
                <td colspan="7" class="empty">등록된 상품이 없습니다.</td>
            </tr>

            <tr th:each="product : ${productList}">
                <td th:text="${product.id}">1</td>

                <td>
                    <a th:href="@{/product/detail/{id}(id=${product.id})}">
                        <img class="product-img"
                             th:src="${product.imageUrl != null and product.imageUrl != ''} ? @{${product.imageUrl}} : @{/images/no-image.png}"
                             alt="상품이미지">
                    </a>
                </td>

                <td class="text-left">
                    <a class="product-link"
                       th:href="@{/product/detail/{id}(id=${product.id})}"
                       th:text="${product.productName}">
                        상품명
                    </a>
                </td>

                <td th:text="${product.category}">초합금</td>

                <td th:text="${#numbers.formatInteger(product.price, 3, 'COMMA') + '원'}">
                    43,000원
                </td>

                <td>
                    <span th:text="${product.stockQty}"
                          th:classappend="${product.stockQty <= 3} ? 'stock-low' : ''">
                        10
                    </span>
                </td>

                <td th:text="${product.createdAt}">2026-06-03</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
