<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품후기관리 - TOY-SHOP</title>

    <link rel="stylesheet" href="/css/common.css">

    <style>
        *{box-sizing:border-box;}
        body{background:#fff;color:#333;}
        .admin-wrap{width:1200px;margin:70px auto 100px;}
        .admin-title{font-size:32px;font-weight:bold;text-align:center;margin-bottom:25px;}
        .admin-menu{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
        .admin-menu a{display:inline-block;padding:11px 24px;border:1px solid #ccc;text-decoration:none;color:#333;font-size:14px;background:white;}
        .admin-menu a.active{background:#333;color:white;border-color:#333;}
        .board-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:35px;flex-wrap:wrap;}
        .board-tabs a{display:inline-block;padding:10px 22px;border:1px solid #ddd;text-decoration:none;color:#444;font-size:14px;background:#fafafa;border-radius:30px;}
        .board-tabs a.active{background:#ffb400;color:#111;border-color:#ffb400;font-weight:bold;}
        .admin-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;gap:12px;}
        .page-sub-title{font-size:20px;font-weight:bold;}
        .top-info{color:#777;font-size:14px;}
        .table-scroll{width:100%;overflow-x:auto;}
        table{width:100%;min-width:980px;border-collapse:collapse;border-top:2px solid #333;}
        th{background:#f7f7f7;padding:14px 10px;border-bottom:1px solid #ddd;font-size:14px;white-space:nowrap;}
        td{padding:14px 10px;border-bottom:1px solid #eee;text-align:center;font-size:14px;vertical-align:middle;}
        .left{text-align:left;}
        .review-product{display:flex;align-items:center;gap:10px;text-align:left;min-width:210px;}
        .review-img{width:52px;height:52px;border:1px solid #eee;background:#f7f7f7;flex-shrink:0;overflow:hidden;}
        .review-img img{width:100%;height:100%;object-fit:cover;}
        .review-name{font-weight:bold;line-height:1.4;}
        .review-title{font-weight:bold;max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .review-content{color:#777;font-size:13px;margin-top:5px;max-width:390px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .rating{color:#ff9f00;font-weight:bold;white-space:nowrap;}
        .empty{padding:60px 0;text-align:center;color:#777;}

        @media (max-width:1240px){.admin-wrap{width:94%;}}
        @media (max-width:1024px){.admin-wrap{margin:45px auto 75px;}.table-scroll{border-top:2px solid #333;}table{border-top:none;}}
        @media (max-width:768px){.admin-title{font-size:26px;}.admin-menu a{flex:1 1 calc(50% - 10px);text-align:center;}.board-tabs a{flex:1 1 calc(33.333% - 8px);text-align:center;padding:10px 8px;}.admin-top{flex-direction:column;align-items:flex-start;}.page-sub-title{font-size:18px;}.top-info{width:100%;text-align:right;}th,td{padding:11px 8px;font-size:13px;}.review-title{max-width:260px;}.review-content{max-width:300px;}.review-img{width:46px;height:46px;}}
        @media (max-width:480px){.admin-wrap{width:100%;padding:0 14px;margin:35px auto 60px;}.admin-title{font-size:22px;}.admin-menu a{flex:1 1 100%;}.board-tabs{gap:6px;}.board-tabs a{font-size:12px;padding:9px 6px;}th,td{font-size:12px;}.review-title{max-width:210px;}.review-content{max-width:230px;font-size:12px;}.review-img{width:42px;height:42px;}}
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="admin-wrap">

    <div class="admin-title">관리자 페이지</div>

    <div class="admin-menu">
        <a href="/admin/product/list">상품관리</a>
        <a href="/admin/product/edit-search">상품수정</a>
        <a href="/admin/order/list">주문관리</a>
        <a href="/admin/board/inquiry" class="active">게시글관리</a>
        <a href="/admin/member/list">회원관리</a>

    </div>

    <div class="board-tabs">
        <a href="/admin/board/inquiry">1:1 문의</a>
        <a href="/admin/board/qna">상품문의</a>
        <a href="/admin/board/review" class="active">상품후기</a>
    </div>

    <div class="admin-top">
        <div class="page-sub-title">상품후기 전체 목록</div>
        <div class="top-info">전체 후기 <strong th:text="${#lists.size(reviewList)}">0</strong>건</div>
    </div>

    <div class="table-scroll">
        <table>
            <thead>
            <tr>
                <th>번호</th>
                <th>상품</th>
                <th>작성자</th>
                <th>평점</th>
                <th>제목/내용</th>
                <th>작성일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(reviewList)}">
                <td colspan="6" class="empty">등록된 상품후기가 없습니다.</td>
            </tr>

            <tr th:each="review, stat : ${reviewList}">
                <td th:text="${stat.count}">1</td>
                <td>
                    <div class="review-product">
                        <div class="review-img">
                            <img th:src="${review.itemImage != null ? review.itemImage : '/images/no-image.png'}" alt="상품이미지">
                        </div>
                        <div class="review-name" th:text="${review.productName}">상품명</div>
                    </div>
                </td>
                <td th:text="${review.writer}">
                    홍길동
                </td>
                <td><span class="rating" th:text="${'★ ' + review.rating}">★ 5</span></td>
                <td class="left">
                    <div class="review-title" th:text="${review.title}">후기 제목</div>
                    <div class="review-content" th:text="${review.content}">후기 내용</div>
                </td>
                <td th:text="${review.createdAt}">2026-07-02</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
