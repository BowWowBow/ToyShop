<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 비밀번호 변경</title>
    <link rel="stylesheet" href="/css/common.css">

    <style>
        .password-wrap {
            max-width: 520px;
            width: 92%;
            margin: 80px auto;
        }

        .password-title {
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 35px;
        }

        .password-box {
            border-top: 2px solid #333;
            padding-top: 30px;
        }

        .form-row {
            margin-bottom: 18px;
        }

        .form-row label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-row input {
            width: 100%;
            height: 46px;
            border: 1px solid #ccc;
            padding: 0 12px;
            font-size: 15px;
        }

        .msg {
            margin-bottom: 18px;
            text-align: center;
            font-weight: bold;
        }

        .error { color: #e53935; }
        .success { color: #1e88e5; }

        .btn-box {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-box button,
        .btn-box a {
            flex: 1;
            height: 48px;
            line-height: 48px;
            text-align: center;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        .submit-btn {
            background: #333;
            color: white;
        }

        .back-btn {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ccc;
        }

        @media (max-width: 480px) {
            .password-title {
                font-size: 24px;
            }

            .btn-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="password-wrap">
    <div class="password-title">관리자 비밀번호 변경</div>

    <div class="password-box">

        <div class="msg error" th:if="${error}" th:text="${error}"></div>
        <div class="msg success" th:if="${message}" th:text="${message}"></div>

        <form method="post" action="/admin/password">
            <div class="form-row">
                <label>현재 비밀번호</label>
                <input type="password" name="currentPassword" required>
            </div>

            <div class="form-row">
                <label>새 비밀번호</label>
                <input type="password" name="newPassword" required>
            </div>

            <div class="form-row">
                <label>새 비밀번호 확인</label>
                <input type="password" name="newPasswordConfirm" required>
            </div>

            <div class="btn-box">
                <button type="submit" class="submit-btn">변경하기</button>
                <a href="/admin/product/list" class="back-btn">관리자 홈</a>
            </div>
        </form>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
