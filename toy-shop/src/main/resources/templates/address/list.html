<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주소록 - TOY-SHOP</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">

    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Malgun Gothic", sans-serif;
            color: #333;
            background: #fff;
        }

        a, button, input, select {
            font-family: inherit;
        }

        .mypage-layout {
            width: min(1200px, calc(100% - 40px));
            margin: 70px auto 120px;
            display: flex;
            gap: 60px;
            align-items: flex-start;
        }

        .side-menu {
            width: 180px;
            flex-shrink: 0;
        }

        .side-menu h2 {
            font-size: 22px;
            margin: 0 0 35px;
        }

        .menu-section {
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .menu-section h3 {
            font-size: 16px;
            margin: 0 0 14px;
            color: #555;
        }

        .menu-section a {
            display: block;
            font-size: 14px;
            color: #777;
            text-decoration: none;
            margin: 8px 0;
        }

        .menu-section a:hover,
        .menu-section a.active {
            color: #111;
            font-weight: bold;
        }

        .address-wrap {
            flex: 1;
            min-width: 0;
        }

        .page-title {
            text-align: center;
            font-size: 30px;
            margin: 0 0 42px;
        }

        .tab-area {
            display: flex;
            border-bottom: 1px solid #333;
        }

        .tab {
            width: 170px;
            height: 48px;
            border: 1px solid #ddd;
            border-bottom: none;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            text-decoration: none;
            color: #333;
            cursor: pointer;
        }

        .tab.active {
            background: #fff;
            border-color: #333;
            font-weight: bold;
        }

        .empty-box {
            min-height: 210px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 16px;
            margin-top: 10px;
            text-align: center;
            padding: 25px;
        }

        .address-card {
            border: 1px solid #ddd;
            padding: 22px;
            margin-top: 12px;
            position: relative;
            min-height: 90px;
            background: #fff;
        }

        .address-card .default {
            display: inline-block;
            padding: 4px 8px;
            background: #333;
            color: #fff;
            font-size: 12px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .address-card .name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            padding-right: 230px;
            word-break: keep-all;
        }

        .address-card p {
            margin: 5px 0;
            color: #555;
            line-height: 1.55;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        .card-btns {
            position: absolute;
            right: 18px;
            top: 18px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .card-btns a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 7px 12px;
            border: 1px solid #ccc;
            text-decoration: none;
            color: #333;
            font-size: 13px;
            background: #fff;
        }

        .card-btns a:hover {
            background: #333;
            color: #fff;
        }

        .register-area {
            text-align: right;
            margin-top: 15px;
        }

        .btn-register {
            width: 80px;
            height: 38px;
            background: #333;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .btn-register:hover {
            background: #111;
        }

        .modal-bg {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            overflow-y: auto;
            padding: 24px 14px;
        }

        .modal-box {
            width: min(650px, 100%);
            background: #fff;
            position: relative;
            margin: min(8vh, 60px) auto;
            padding: 28px 32px 24px;
        }

        .modal-title {
            font-size: 22px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .close-btn {
            font-size: 32px;
            cursor: pointer;
            color: #777;
            line-height: 1;
        }

        .info-text {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-top: 1px solid #999;
            border-bottom: 1px solid #999;
        }

        th {
            width: 100px;
            background: #f7f7f7;
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-weight: normal;
            vertical-align: middle;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
        }

        input,
        select {
            height: 34px;
            border: 1px solid #ccc;
            padding: 0 8px;
        }

        .w170 { width: 170px; }
        .w100 { width: 100%; }

        .phone-input {
            width: 70px;
        }

        .zipcode-input {
            width: 100px;
        }

        .btn-small {
            height: 34px;
            border: 1px solid #333;
            background: #fff;
            cursor: pointer;
            margin-left: 5px;
            padding: 0 12px;
        }

        .modal-btn-area {
            text-align: center;
            margin-top: 18px;
        }

        .btn-submit {
            width: 100px;
            height: 45px;
            background: #333;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        @media (max-width: 1024px) {
            .mypage-layout {
                width: min(100% - 32px, 900px);
                gap: 32px;
                margin-top: 45px;
            }

            .side-menu {
                width: 165px;
            }

            .page-title {
                font-size: 28px;
                margin-bottom: 32px;
            }
        }

        @media (max-width: 768px) {
            .mypage-layout {
                display: block;
                width: calc(100% - 28px);
                margin: 32px auto 80px;
            }

            .side-menu {
                width: 100%;
                margin-bottom: 34px;
                border: 1px solid #eee;
                padding: 18px 16px 6px;
            }

            .side-menu h2 {
                font-size: 20px;
                margin-bottom: 18px;
                text-align: center;
            }

            .menu-section {
                margin-bottom: 16px;
                padding-bottom: 12px;
            }

            .menu-section h3 {
                font-size: 15px;
                margin-bottom: 10px;
            }

            .menu-section a {
                display: inline-block;
                margin: 4px 12px 4px 0;
                font-size: 13px;
            }

            .page-title {
                font-size: 26px;
                margin-bottom: 24px;
            }

            .tab {
                width: 100%;
            }

            .address-card {
                padding: 18px;
            }

            .address-card .name {
                padding-right: 0;
                margin-top: 44px;
                font-size: 17px;
            }

            .card-btns {
                left: 18px;
                right: 18px;
                top: 14px;
                justify-content: flex-end;
            }

            .register-area {
                text-align: center;
            }

            .btn-register {
                width: 100%;
                max-width: 220px;
                height: 42px;
            }

            .modal-box {
                padding: 24px 20px 22px;
            }

            .modal-title {
                font-size: 20px;
                margin-bottom: 18px;
            }

            th,
            td {
                display: block;
                width: 100%;
            }

            th {
                padding: 11px 10px 6px;
                border-bottom: none;
                background: #fafafa;
                font-weight: bold;
            }

            td {
                padding: 8px 10px 14px;
            }

            .w170,
            td select {
                width: 100% !important;
            }

            .zipcode-input {
                width: 120px;
            }
        }

        @media (max-width: 480px) {
            .mypage-layout {
                width: calc(100% - 20px);
                margin-top: 24px;
            }

            .side-menu {
                padding: 16px 12px 4px;
            }

            .menu-section a {
                font-size: 12px;
                margin-right: 8px;
            }

            .page-title {
                font-size: 24px;
            }

            .empty-box {
                min-height: 150px;
                font-size: 14px;
            }

            .address-card {
                padding: 16px 14px;
            }

            .card-btns {
                position: static;
                justify-content: flex-end;
                margin-bottom: 12px;
            }

            .card-btns a {
                flex: 1;
                min-width: 95px;
                padding: 7px 8px;
                font-size: 12px;
            }

            .address-card .name {
                margin-top: 0;
                font-size: 16px;
            }

            .address-card p {
                font-size: 14px;
            }

            .modal-bg {
                padding: 10px;
            }

            .modal-box {
                margin: 20px auto;
                padding: 22px 14px 20px;
            }

            .modal-title {
                font-size: 18px;
            }

            .info-text {
                font-size: 13px;
            }

            input,
            select,
            .btn-small {
                width: 100%;
                height: 38px;
            }

            .zipcode-input {
                width: 100%;
                margin-bottom: 8px;
            }

            .btn-small {
                margin-left: 0;
            }

            .phone-input {
                width: calc((100% - 20px) / 3);
                text-align: center;
                padding: 0 4px;
            }

            .btn-submit {
                width: 100%;
                height: 46px;
            }
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="mypage-layout">

    <aside class="side-menu">
        <h2>MY SHOPPING</h2>

        <div class="menu-section">
            <h3>나의 쇼핑</h3>
            <a href="/order">주문/배송</a>
            <a href="/wishlist/list">위시리스트</a>
            <a href="/recent/list">최근 본 상품</a>
            <a href="/address/list" class="active">배송주소록</a>
        </div>

        <div class="menu-section">
            <h3>나의 혜택</h3>
            <a href="/member/mileage">마일리지</a>
        </div>

        <div class="menu-section">
            <h3>나의 활동</h3>
            <a href="/member/inquiry">나의 1:1문의</a>
            <a href="/member/product-qna">나의 상품문의</a>
            <a href="/member/review">나의 상품후기</a>
        </div>

        <div class="menu-section">
            <h3>나의 정보</h3>
            <a href="/member/edit">회원정보 수정</a>
            <a href="/member/change-password">비밀번호 변경</a>
            <a href="/member/dormant">휴면 전환</a>
        </div>
    </aside>

    <main class="address-wrap">

        <h2 class="page-title">주소록</h2>

        <div class="tab-area">
            <a href="/address/list" class="tab active">자주쓰는 배송지</a>
        </div>

        <div th:if="${addressList == null or #lists.isEmpty(addressList)}"
             class="empty-box">
            등록하신 자주쓰는 배송지가 없습니다.
        </div>

        <div th:each="addr : ${addressList}"
             class="address-card">

            <div class="card-btns">
                <a th:href="@{/address/edit/{id}(id=${addr.id})}">
                    수정
                </a>

                <a th:href="@{/address/default/{id}(id=${addr.id})}"
                   th:if="${addr.isDefault != 'Y'}">
                    기본배송지
                </a>

                <a th:href="@{/address/delete/{id}(id=${addr.id})}"
                   onclick="return confirm('삭제하시겠습니까?')">
                    삭제
                </a>
            </div>

            <div class="name">
                <span class="default"
                      th:if="${addr.isDefault == 'Y'}">
                    기본
                </span>

                <span th:text="${addr.receiverName}">
                    받는분
                </span>
            </div>

            <p th:text="${addr.receiverPhone}">
                010-0000-0000
            </p>

            <p>
                [<span th:text="${addr.zipcode}">00000</span>]
                <span th:text="${addr.address}">주소</span>
                <span th:text="${addr.addressDetail}">상세주소</span>
            </p>
        </div>

        <div class="register-area">
            <button type="button"
                    class="btn-register"
                    onclick="openAddressModal()">
                등록
            </button>
        </div>

    </main>
</div>

<div class="modal-bg" id="addressModal">
    <div class="modal-box">
        <form th:action="@{/address/save}" method="post">
            <div class="modal-title">
                <span>배송지 등록</span>
                <span class="close-btn" onclick="closeAddressModal()">×</span>
            </div>

            <div class="info-text">
                새로 등록한 배송지는 기본 배송지로 저장됩니다.
            </div>

            <table>
                <tr>
                    <th>받는분</th>
                    <td>
                        <input type="text"
                               name="receiverName"
                               class="w170"
                               required>
                    </td>
                </tr>

                <tr>
                    <th>주소</th>
                    <td>
                        <input type="text"
                               name="zipcode"
                               id="zipcode"
                               class="zipcode-input"
                               readonly
                               required>

                        <button type="button"
                                class="btn-small"
                                onclick="searchZipcode()">
                            우편번호 검색
                        </button>

                        <br><br>

                        <input type="text"
                               name="address"
                               id="address"
                               class="w100"
                               readonly
                               required>

                        <br><br>

                        <input type="text"
                               name="addressDetail"
                               id="addressDetail"
                               class="w100"
                               placeholder="상세 주소"
                               required>
                    </td>
                </tr>

                <tr>
                    <th>휴대폰</th>
                    <td>
                        <input type="text"
                               id="phone1"
                               class="phone-input"
                               maxlength="3">
                        -
                        <input type="text"
                               id="phone2"
                               class="phone-input"
                               maxlength="4">
                        -
                        <input type="text"
                               id="phone3"
                               class="phone-input"
                               maxlength="4">

                        <input type="hidden"
                               name="receiverPhone"
                               id="receiverPhone">
                    </td>
                </tr>
            </table>

            <div class="modal-btn-area">
                <button type="submit"
                        class="btn-submit"
                        onclick="return makePhone();">
                    확인
                </button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    function openAddressModal(){
        document.getElementById("addressModal").style.display = "block";
    }

    function closeAddressModal(){
        document.getElementById("addressModal").style.display = "none";
    }

    function makePhone(){
        const phone1 = document.getElementById("phone1").value.trim();
        const phone2 = document.getElementById("phone2").value.trim();
        const phone3 = document.getElementById("phone3").value.trim();

        if(phone1 === "" || phone2 === "" || phone3 === ""){
            alert("휴대폰 번호를 입력해주세요.");
            return false;
        }

        document.getElementById("receiverPhone").value =
            phone1 + "-" + phone2 + "-" + phone3;

        return true;
    }

    function searchZipcode(){
        new daum.Postcode({
            oncomplete: function(data) {
                document.getElementById("zipcode").value = data.zonecode;
                document.getElementById("address").value =
                    data.roadAddress || data.jibunAddress;

                document.getElementById("addressDetail").focus();
            }
        }).open();
    }
</script>

</body>
</html>
